spring.application.name=spring_boot_1

# === DB ==========================================================
# Postgres 기본 (save-it ERD 정합). 운영 환경에선 환경변수로 주입.
# 예: export SPRING_DATASOURCE_URL=jdbc:postgresql://prod-db:5432/saveit
#     export SPRING_DATASOURCE_USERNAME=appuser
#     export SPRING_DATASOURCE_PASSWORD=<강력한 비밀번호>
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saveit_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:joyeonghun}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# === JPA =========================================================
# 베타 단계 기본값은 update. 운영 직전엔 validate로 바꾸고 Flyway/Liquibase 도입.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# === Security / CORS =============================================
# 쉼표로 구분된 허용 출처. 운영 도메인 추가 시 환경변수로 덮어쓰기.
# JWT 기반 stateless 인증이라 credentials/SameSite/cookie 설정 불필요.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# === Rate Limit (사용자/일자별) ====================================
# 베타 기본값. 환경변수로 덮어쓸 수 있음.
# (2026-05-21 OpenAI 의존성 제거에 따라 recommendation-* 관련 항목 폐기)
app.ratelimit.link-create=${APP_RATELIMIT_LINK_CREATE:200}

# === JWT 인증 ====================================================
# save-it 가정한 인증 모델 정합 — Supabase JWT 대신 자체 발급.
# secret 은 운영에서 반드시 환경변수로 재정의 (최소 256bit / 32바이트).
app.jwt.secret=${APP_JWT_SECRET:dev-only-secret-do-not-use-in-prod-must-be-at-least-32-bytes-long}
app.jwt.access-ttl-minutes=${APP_JWT_ACCESS_TTL_MINUTES:15}
app.jwt.refresh-ttl-days=${APP_JWT_REFRESH_TTL_DAYS:7}
app.jwt.issuer=${APP_JWT_ISSUER:saveit}

# === 리마인드 스케줄러 =============================================
# REMIND_STRATEGY §3.1 — 매일 정해진 시각 사용자별 today 후보를 link_reminders 로 INSERT.
# Spring relaxed binding: APP_REMINDER_DAILY_CRON 환경변수로 override.
# 6-필드 cron: "초 분 시 일 월 요일". Asia/Seoul 기준.
app.reminder.daily-cron=${APP_REMINDER_DAILY_CRON:0 0 9 * * *}
# 사용자당 매 디지스트에 기록할 최대 후보 수
app.reminder.digest-size=${APP_REMINDER_DIGEST_SIZE:5}
